name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run compile

      - run: npm test

      - run: npx vsce package
        if: github.ref == 'refs/heads/main'

      - uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          path: vscode-auth-broker-*.vsix
          if-no-files-found: error
